name: CI — Build, Test, Verify

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write

jobs:
  # ─────────────────────────────────────────────────────
  # Stage 1: Unit tests (fast, no Docker required)
  # ─────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests (Java ${{ matrix.java }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 17, 21 ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile all modules
        run: mvn clean compile -DskipTests --batch-mode --no-transfer-progress

      - name: Run unit tests
        run: mvn test -DskipITs --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports-java-${{ matrix.java }}
          path: '**/target/surefire-reports/*.xml'
          retention-days: 14

  # ─────────────────────────────────────────────────────
  # Stage 2: Integration tests (requires Docker)
  # ─────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run integration tests
        run: mvn test -pl fasc-integration-tests -am -Pintegration-tests --batch-mode --no-transfer-progress

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: 'fasc-integration-tests/target/surefire-reports/*.xml'
          retention-days: 14

  # ─────────────────────────────────────────────────────
  # Stage 3: Package (build JARs + Docker image)
  # ─────────────────────────────────────────────────────
  package:
    name: Package & Docker Build
    runs-on: ubuntu-latest
    needs: [ unit-tests, integration-tests ]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build all JARs
        run: mvn clean package -DskipTests --batch-mode --no-transfer-progress

      - name: Build Docker image (coordinator)
        run: |
          docker build -t fasc-coordinator:ci \
            -f fasc-coordinator/Dockerfile .

      - name: Verify Docker image
        run: |
          docker run --rm fasc-coordinator:ci java -version
          echo "Docker image built successfully"

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: fasc-jars
          path: |
            fasc-core/target/fasc-core-*.jar
            fasc-aws/target/fasc-aws-*.jar
            fasc-coordinator/target/fasc-coordinator-*-exec.jar
            fasc-examples/target/fasc-examples-*.jar
          retention-days: 30
