{{- if .Values.configMap.create -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fasc-coordinator.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "fasc-coordinator.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
